{% extends 'ballotbox/base.html' %}
{% load ballotbox_tags %}  ```

{% block details %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card card-primary">
            <div class="card-header"><div class="card-title">{{ ballot.title }}</div></div>
            <div class="card-body">
                <div class="mb-4">
                    {{ ballot.description|render_markdown }}
                </div>
                <hr>
                <form method="post">
                    {% csrf_token %}
                    <h4 class="mb-3">Official Ballot:</h4>
                    {% for option in ballot.options.all %}
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="option" id="opt{{ option.id }}" value="{{ option.id }}" required {% if current_vote and current_vote.option.id == option.id %}checked{% endif %}>
                            <label class="form-check-label" for="opt{{ option.id }}">
                                {{ option.text }}
                            </label>
                        </div>
                    {% endfor %}
                    <div class="mt-4">
                        <button type="submit" class="btn {% if current_vote %}btn-warning{% else %}btn-success{% endif %} w-100">
                            {% if current_vote %}Update Secure Vote{% else %}Cast Secure Vote{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
